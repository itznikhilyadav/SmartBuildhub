{% extends 'homeownerbash.html' %} 
{% load static %}


{% block homeowner %}

<h3>Edit Profile</h3>


<form method="post" class="row g-4 " enctype="multipart/form-data">
    {% csrf_token %}
    <div class="col-sm-6">
        <label for="n" class="form">Name</label>
        <input type="text" value="{{homeowner.name}}" name="name"
        id="n" class="form-control" >
        
    </div>

    <div class="col-sm-6">
        <label for="cn"class="form-label">Contact No</label>
        <input type="text" value="{{homeowner.contactno}}" name="contactno" id="cn" class="form-control" >
        
    </div>

    <div class="col-sm-6">
        <label for="em"class="form-label">Email </label>
        <input type="text" value="{{homeowner.email}}" name="email" id="em" class="form-control" disabled>
        
    </div>

    <div class="col-sm-6">
        <label for="pro"class="form-label">Choose Profile Picture </label>
        <input type="file"  name="profile" id="pro" class="form-control">
        
    </div>

    <div class="col-sm-6">
        <label for="ad"class="form-label">Enter Full Address</label>
        <textarea   name="address" id="ad" class="form-control">{{homeowner.address}}</textarea>
        
    </div>
    <div class="col-sm-6">
        <label for="bio"class="form-label">Bio</label>
        <textarea  name="bio" id="bio" class="form-control">{{homeowner.bio}}</textarea>
        
    </div>

    <div class="col-sm-12">
        <button type="submit"class="btn btn-success" >Update</button>
    </div>

</form>

{% endblock %}
