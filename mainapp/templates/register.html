{% extends 'base.html' %}
{% load static %}
{% block main %}



<div class="row  my-5">
    <div class="col-sm-4 card p-2 mx-auto shadow">
        <div class="container mt-5">
            <h2 class="mb-4 text-center display-4 fw-bold" style="color: orange;">Register</h2>
            {% if messages %}
            {% for m in messages %}
            <div class="alert alert-success alert-dismissible fade show" role="alert">
                {{m}}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            {% endfor %}
            {% endif %}
            <form method="post">
                {% csrf_token %}

                <div class=" mt-3">
                    <i class="fa-solid fa-circle-user" style="color: orange;"></i>
                    <label for="full name" class="form-label">Full Name</label>
                    <input type="name" name="name" class="form-control" id="Name" placeholder="Enter First Name"
                        required>
                </div>



                <div class="mt-3">
                    <i class="fa-solid fa-envelope" style="color: orange;"></i>
                    <label for="email" class="form-label">Email address</label>
                    <input type="email" name="email" class="form-control" id="email" placeholder="Enter your email"
                        required>
                </div>
                <div class="mt-3">
                    <i class="fa-solid fa-phone" style="color: orange;"></i>
                    <label for="Phone number" class="form-label">Phone number</label>
                    <input type="text" class="form-control" name="contactno" id="username" placeholder="Enter your Phone number"
                        required>
                </div>
                <div class="mb-3">
                    <label for="disabledSelect" class="form-label">Disabled select menu</label>
                    <select id="disabledSelect" name="usertype" class="form-select">
                        <option>Select Usertype</option>
                        <option>homeowner</option>
                        <option>contractor</option>
                    </select>
                </div>
                <div class="mt-3">
                    <i class="fa-solid fa-envelope" style="color: orange;"></i>
                    <label for="password" class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" id="password"
                        placeholder="Enter password" required>
                </div>


                <button type="submit" class="btn w-100 mt-5" style="background-color: orange;">Register</button>
                <br>
                <br>
                <br>
            </form>
        </div>

    </div>
</div>








{% endblock %}
